server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resolver para Docker Compose (usar 127.0.0.11 solo si nginx corre en Docker)
    # Si nginx corre directo en EC2 quitar esta linea
    resolver localhost valid=10s ipv6=off;

    # ── Microservicios ──────────────────────────────────────

    location /api/cursos/ {
        proxy_pass          ${CURSOS_URL};
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    location /api/alumnos/ {
        proxy_pass          ${USUARIOS_URL};
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── Frontend React ───────────────────────────────────────

    # Assets estaticos — cache agresivo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — todas las rutas van al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}